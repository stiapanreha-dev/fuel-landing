legal:
  privacy_title: "Политика конфиденциальности"
  consent_title: "Согласие на обработку персональных данных"
  privacy_sections:
    - title: "1. Общие положения"
      text: "Настоящая политика определяет порядок обработки и защиты персональных данных пользователей сайта. Оператор обрабатывает данные в соответствии с законодательством Российской Федерации."
    - title: "2. Какие данные собираются"
      text: "При отправке заявки могут обрабатываться: имя, номер телефона, адрес доставки, вид и объём топлива, комментарий к заказу, а также технические данные (UTM-метки, cookies)."
    - title: "3. Цели обработки"
      text: "Данные используются для расчёта стоимости топлива и доставки, обратной связи с клиентом и исполнения договорных обязательств."
    - title: "4. Передача третьим лицам"
      text: "Персональные данные не передаются третьим лицам, за исключением случаев, предусмотренных законом, или при наличии согласия пользователя."
    - title: "5. Контакты оператора"
      text: "По вопросам обработки персональных данных обращайтесь по контактам, указанным на сайте."
  consent_text: |
    Отправляя заявку на сайте, вы даёте согласие на обработку персональных данных: имени, телефона, адреса доставки и иных сведений, указанных в форме, в целях расчёта стоимости топлива, обратной связи и оформления поставки.

    Согласие действует до момента его отзыва. Отозвать согласие можно, направив обращение на email, указанный в разделе контактов.
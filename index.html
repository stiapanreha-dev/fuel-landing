<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бензин АИ-92 и АИ-95 с доставкой</title>
  <meta name="description" content="Поставка бензина АИ-92 и АИ-95 с доставкой по Москве, Московской области и регионам России.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%231a2b42'/><text x='50' y='64' font-size='40' text-anchor='middle' fill='%23f5a623' font-family='Arial'>⛽</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/sections.css">
  <link rel="stylesheet" href="css/bottom-sections.css">
</head>
<body>
  <div id="loading" class="loading-screen">Загрузка…</div>

  <div id="app" class="site-root" hidden>
    <header class="header" id="header"></header>
    <main>
      <section id="hero" class="section section--hero"></section>
      <section id="advantages" class="section"></section>
      <section id="fuel" class="section section--alt"></section>
      <section id="audience" class="section"></section>
      <section id="order" class="section section--alt"></section>
      <section id="delivery" class="section"></section>
      <section id="contacts" class="section section--contacts"></section>
    </main>
    <footer class="footer" id="footer"></footer>
  </div>

  <div id="lead-modal" class="modal" hidden aria-hidden="true" role="dialog" aria-labelledby="lead-modal-title">
    <div class="modal__backdrop" data-close-modal></div>
    <div class="modal__dialog">
      <button class="modal__close" type="button" data-close-modal aria-label="Закрыть">&times;</button>
      <h2 class="modal__title" id="lead-modal-title">Рассчитать стоимость</h2>
      <p class="modal__subtitle">Заполните форму — менеджер рассчитает стоимость топлива и доставки</p>
      <form id="lead-form" novalidate>
        <div id="lead-form-fields"></div>
        <button class="btn btn--accent form__submit" type="submit" id="lead-form-submit">Отправить заявку</button>
        <p class="form__note">Отправка заявок будет подключена в спринте 5</p>
      </form>
      <div id="lead-success" class="form__success" hidden>
        <div class="form__success-icon" aria-hidden="true">✓</div>
        <h3 class="modal__title">Заявка принята</h3>
        <p id="lead-success-text"></p>
        <button class="btn btn--accent" type="button" data-close-modal style="margin-top:20px;width:100%;">Закрыть</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/section-icons.js"></script>
  <script src="js/config-loader.js"></script>
  <script src="js/form-render.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/contacts-form.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
